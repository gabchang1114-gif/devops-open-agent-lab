<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>

  <text x="600" y="42" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">
    DevOps Open Agent  LLM Provider Architecture
  </text>
  <text x="600" y="68" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">
    One platform · Shared LLM layer · Your choice of provider
  </text>

  <!-- DevOps Open Agent -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="220" height="220" rx="28" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <image x="95" y="165" width="170" height="170" xlink:href="devops-open-agent-icon.png" preserveAspectRatio="xMidYMid meet"/>
    <text x="180" y="345" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="18" font-weight="700">DevOps Open Agent</text>
    <text x="180" y="368" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">K8s · AWS · Cost · PR Review</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="290" y1="260" x2="430" y2="260" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Shared LLM Layer -->
  <g filter="url(#shadow)">
    <rect x="430" y="185" width="240" height="150" rx="20" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
    <text x="550" y="235" text-anchor="middle" fill="#38BDF8" font-family="system-ui, sans-serif" font-size="13" font-weight="700">SHARED AI LAYER</text>
    <text x="550" y="268" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="22" font-weight="700">LLM</text>
    <text x="550" y="295" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">llm_factory.py</text>
    <text x="550" y="315" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="11">Context · Prompts · RCA</text>
  </g>

  <!-- Branch lines -->
  <line x1="670" y1="260" x2="760" y2="260" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="260" x2="760" y2="130" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="260" x2="760" y2="260" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="260" x2="760" y2="390" stroke="#A78BFA" stroke-width="3"/>
  <line x1="760" y1="130" x2="860" y2="130" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <line x1="760" y1="260" x2="860" y2="260" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <line x1="760" y1="390" x2="860" y2="390" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowPurple)"/>

  <!-- Ollama -->
  <g filter="url(#shadow)">
    <rect x="860" y="70" width="260" height="120" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="130" r="22" fill="#0F172A" stroke="#22D3EE" stroke-width="2"/>
    <text x="900" y="136" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="16" font-weight="700">O</text>
    <text x="990" y="118" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Ollama</text>
    <text x="990" y="142" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Local / self-hosted LLM</text>
    <text x="990" y="162" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">LLM_PROVIDER=ollama</text>
  </g>

  <!-- OpenAI -->
  <g filter="url(#shadow)">
    <rect x="860" y="200" width="260" height="120" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="260" r="22" fill="#0F172A" stroke="#10B981" stroke-width="2"/>
    <text x="900" y="266" text-anchor="middle" fill="#10B981" font-family="system-ui, sans-serif" font-size="14" font-weight="700">AI</text>
    <text x="990" y="248" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">OpenAI</text>
    <text x="990" y="272" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">GPT-4o / GPT-4o-mini</text>
    <text x="990" y="292" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">LLM_PROVIDER=openai</text>
  </g>

  <!-- Anthropic -->
  <g filter="url(#shadow)">
    <rect x="860" y="330" width="260" height="120" rx="18" fill="#171B26" stroke="#334155" stroke-width="2"/>
    <circle cx="900" cy="390" r="22" fill="#0F172A" stroke="#F59E0B" stroke-width="2"/>
    <text x="900" y="396" text-anchor="middle" fill="#F59E0B" font-family="system-ui, sans-serif" font-size="14" font-weight="700">C</text>
    <text x="990" y="378" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Anthropic</text>
    <text x="990" y="402" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Claude Sonnet / Opus</text>
    <text x="990" y="422" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">LLM_PROVIDER=anthropic</text>
  </g>

  <text x="600" y="495" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="12">
    Configure provider in backend/.env · All four agent modules use the same LLM layer
  </text>
</svg>
