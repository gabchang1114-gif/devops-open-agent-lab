apiVersion: v1
kind: Namespace
metadata:
  name: kda-test-imagepull
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-image-app
  namespace: kda-test-imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad-image-app
  template:
    metadata:
      labels:
        app: bad-image-app
    spec:
      containers:
        - name: app
          image: nginx:this-tag-does-not-exist-12345
