apiVersion: v1
kind: Namespace
metadata:
  name: kda-test-network
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-app
  namespace: kda-test-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: kda-test-network
spec:
  selector:
    app: wrong-label
  ports:
    - port: 80
      targetPort: 80
