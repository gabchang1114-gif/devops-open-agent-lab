apiVersion: v1
kind: Namespace
metadata:
  name: kda-test-crashloop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: kda-test-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -z "$DATABASE_URL" ]; then
                echo "Error: DATABASE_URL environment variable is missing"
                exit 1
              fi
              sleep 3600
