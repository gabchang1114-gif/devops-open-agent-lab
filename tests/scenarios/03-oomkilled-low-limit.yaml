apiVersion: v1
kind: Namespace
metadata:
  name: kda-test-oom
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog
  namespace: kda-test-oom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog
  template:
    metadata:
      labels:
        app: memory-hog
    spec:
      containers:
        - name: hog
          image: polinux/stress
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]
          resources:
            limits:
              memory: "64Mi"
            requests:
              memory: "64Mi"
